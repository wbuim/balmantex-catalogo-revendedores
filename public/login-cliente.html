<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Balmantex</title>
    <link rel="icon" type="image/png" href="balmantex-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
        .form-group input { padding: 12px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body style="background-color: var(--section-alt-bg);">
    <header>
        <div class="header-content">
            <div class="logo-container">
                <a href="index.html">
                    <img src="balmantex-logo.png" alt="Balmantex Logotipo" class="header-logo" style="width: 80px; height: 80px;">
                </a>
            </div>
            <nav>
                <a href="index.html">Voltar para a Loja</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 3rem; padding-bottom: 5rem;">
        <div style="display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; align-items: flex-start;">
            
            <div style="background: white; padding: 3rem 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; max-width: 400px; position: sticky; top: 120px;">
                <h2 style="color: var(--primary-color); margin-bottom: 20px;">Já tenho conta</h2>
                <form id="form-login-cliente" style="display: flex; flex-direction: column; gap: 15px;">
                    <input type="email" id="login-email" placeholder="Seu E-mail" required>
                    <input type="password" id="login-senha" placeholder="Sua Senha" required>
                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Entrar na minha conta</button>
                    <p id="msg-login" style="font-size: 0.9rem; margin-top: 10px;"></p>
                </form>
            </div>

            <div style="background: white; padding: 3rem 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; max-width: 600px;">
                <h2 style="color: var(--text-dark); margin-bottom: 20px;">Quero me cadastrar</h2>
                <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 20px;">Preencha seus dados para agilizar suas compras de atacado ou varejo.</p>
                
                <form id="form-cadastro-cliente" style="display: flex; flex-direction: column; gap: 15px;">
                    
                    <h3 style="font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 10px;">1. Dados Pessoais</h3>
                    <div class="form-group">
                        <label>Nome Completo ou Razão Social *</label>
                        <input type="text" id="cad-nome" required>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>CPF ou CNPJ *</label>
                            <input type="text" id="cad-cpf_cnpj" maxlength="18" placeholder="000.000.000-00" required>
                        </div>
                        <div class="form-group">
                            <label>Telefone / WhatsApp *</label>
                            <input type="tel" id="cad-telefone" maxlength="15" placeholder="(00) 90000-0000" required>
                        </div>
                    </div>

                    <h3 style="font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 20px;">2. Endereço de Entrega</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>CEP *</label>
                            <input type="text" id="cad-cep" maxlength="9" placeholder="00000-000" required>
                            <span id="cep-loading" style="font-size: 0.75rem; color: var(--primary-color); display: none;">Buscando endereço...</span>
                        </div>
                        <div class="form-group">
                            <label>Bairro *</label>
                            <input type="text" id="cad-bairro" required>
                        </div>
                    </div>
                    <div class="form-grid" style="grid-template-columns: 2fr 1fr;">
                        <div class="form-group">
                            <label>Rua / Avenida *</label>
                            <input type="text" id="cad-rua" required>
                        </div>
                        <div class="form-group">
                            <label>Número *</label>
                            <input type="text" id="cad-numero" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Cidade *</label>
                            <input type="text" id="cad-cidade" required>
                        </div>
                        <div class="form-group">
                            <label>Estado (UF) *</label>
                            <input type="text" id="cad-estado" maxlength="2" required>
                        </div>
                    </div>

                    <h3 style="font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 20px;">3. Acesso à Conta</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>E-mail *</label>
                            <input type="email" id="cad-email" required>
                        </div>
                        <div class="form-group">
                            <label>Criar Senha *</label>
                            <input type="password" id="cad-senha" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 20px; font-size: 1.1rem; padding: 18px;">Finalizar Cadastro e Entrar</button>
                    <p id="msg-cadastro" style="font-size: 0.9rem; text-align: center; font-weight: 600;"></p>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
